<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gnome Sort</title>
    <style>
        :root { 
            --bg: #09090b; --bar: #27272a; --active: #ef4444; --success: #22c55e; --text: #fafafa;
        }
        body { 
            background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; 
        }
        #visualizer { 
            display: flex; align-items: flex-end; height: 300px; width: 90vw; max-width: 600px;
            gap: 4px; padding: 20px; background: #18181b; border-radius: 12px; border: 1px solid #3f3f46;
        }
        .bar { flex: 1; background: var(--bar); border-radius: 2px; transition: height 0.05s; }
        .active { background: var(--active); box-shadow: 0 0 15px var(--active); }
        .success { background: var(--success); }
        button { 
            margin-top: 40px; padding: 12px 28px; cursor: pointer; border: none; border-radius: 8px; 
            font-weight: 600; background: var(--text); color: var(--bg); font-size: 1rem;
        }
        button:disabled { opacity: 0.2; }
    </style>
</head>
<body>

    <h1 style="font-weight: 500; opacity: 0.9;">Gnome Sort</h1>
    <div id="visualizer"></div>
    <button id="start" onclick="runSort()">Start Sorting</button>

    <script>
        const container = document.getElementById('visualizer');
        const startBtn = document.getElementById('start');
        let audioCtx;
        let arr = [];
        const n_elements = 20; // Fewer elements makes the "music" clearer

        function init() {
            arr = Array.from({length: n_elements}, () => Math.floor(Math.random() * 80) + 15);
            render();
        }

        function render(activePos = -1, isDone = false) {
            container.innerHTML = '';
            arr.forEach((val, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar' + (i === activePos ? ' active' : '') + (isDone ? ' success' : '');
                bar.style.height = `${val}%`;
                container.appendChild(bar);
            });
        }

        function playTone(val, type = 'sine') {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            // Frequency logic: map height to a pleasant musical range
            osc.frequency.setValueAtTime(220 + (val * 8), audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        async function playVictory() {
            const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51]; 
            for (let freq of notes) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.8);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.8);
                await new Promise(r => setTimeout(r, 100));
            }
        }

        async function runSort() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            startBtn.disabled = true;

            let pos = 0;
            const n = arr.length;

            while (pos < n) {
                render(pos);
                
                // Play a standard tone for the "check"
                playTone(arr[pos], 'sine');
                await new Promise(r => setTimeout(r, 50));

                if (pos === 0 || arr[pos] >= arr[pos - 1]) {
                    pos++;
                } else {
                    // SWAP HAPPENING HERE
                    // Play a sharper tone for the swap to match the video energy
                    playTone(arr[pos], 'triangle'); 
                    
                    [arr[pos], arr[pos - 1]] = [arr[pos - 1], arr[pos]];
                    pos--;
                    
                    render(pos); // Show the swap immediately
                    await new Promise(r => setTimeout(r, 50));
                }
            }
            
            render(-1, true);
            await playVictory();
            
            setTimeout(() => { init(); startBtn.disabled = false; }, 2000);
        }

        init();
    </script>
</body>
</html>
