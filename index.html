<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnome Sort Visualizer</title>
    <style>
        :root { 
            --bg: #0d1117; 
            --bar-color: #58a6ff; 
            --active-color: #ff7b72; 
            --success-color: #3fb950;
            --text: #c9d1d9;
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        #visualizer { 
            display: flex; 
            align-items: flex-end; 
            height: 400px; 
            width: 90vw; 
            max-width: 800px;
            gap: 3px; 
            padding: 20px;
            background: #161b22;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .bar { 
            flex: 1; 
            background: var(--bar-color); 
            border-radius: 3px 3px 0 0;
            transition: height 0.05s ease, background-color 0.2s; 
        }
        .active { background: var(--active-color); box-shadow: 0 0 12px var(--active-color); }
        .success { background: var(--success-color); }
        .controls { margin-top: 30px; display: flex; gap: 15px; }
        button { 
            padding: 12px 24px; 
            cursor: pointer; 
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
            background: #238636; 
            color: white; 
            transition: 0.2s;
        }
        button:hover { background: #2ea043; }
        button:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
        #reset { background: #30363d; }
        #reset:hover { background: #3c444d; }
    </style>
</head>
<body>

    <h1>Gnome Sort Visualizer</h1>
    <div id="visualizer"></div>

    <div class="controls">
        <button id="reset" onclick="init()">Shuffle</button>
        <button id="start" onclick="runSort()">Start Sort</button>
    </div>

    <script>
        const container = document.getElementById('visualizer');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let arr = []; // Matches the image
        const n_elements = 40;

        function init() {
            arr = Array.from({length: n_elements}, () => Math.floor(Math.random() * 90) + 10);
            render();
            document.getElementById('start').disabled = false;
        }

        function render(activePos = -1, isDone = false) {
            container.innerHTML = '';
            arr.forEach((val, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                if (i === activePos) bar.classList.add('active');
                if (isDone) bar.classList.add('success');
                bar.style.height = `${val}%`;
                container.appendChild(bar);
            });
        }

        function playTone(val) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(200 + (val * 8), audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        async function playVictory() {
            const scale = [523.25, 659.25, 783.99, 1046.50]; // C Major Arpeggio
            for (let freq of scale) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
                await new Promise(r => setTimeout(r, 150));
            }
        }

        // --- CODE FROM YOUR IMAGE INTEGRATED BELOW ---
        async function runSort() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('start').disabled = true;
            document.getElementById('reset').disabled = true;

            let pos = 0;
            const n = arr.length; // From image

            while (pos < n) {
                render(pos);
                playTone(arr[pos]);
                await new Promise(r => setTimeout(r, 40));

                if (pos === 0 || arr[pos] >= arr[pos - 1]) {
                    pos++;
                } else {
                    // Swap current and previous (From image)
                    [arr[pos], arr[pos - 1]] = [arr[pos - 1], arr[pos]];
                    pos--;
                }
            }
            
            render(-1, true);
            await playVictory();
            document.getElementById('reset').disabled = false;
        }

        init();
    </script>
</body>
</html>
