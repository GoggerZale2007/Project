<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr.CC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Inter', sans-serif; }
        .cc-container { position: absolute; bottom: 12%; left: 0; right: 0; display: flex; justify-content: center; pointer-events: none; z-index: 100; }
        .cc-box { background: rgba(0, 0, 0, 0.9); color: #fff; padding: 10px 24px; border-radius: 12px; font-size: 1.5rem; font-weight: 600; text-align: center; border: 1px solid rgba(255, 255, 255, 0.1); max-width: 85%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: opacity 0.2s; }
        .active-line { color: #60a5fa; font-weight: 800; background: rgba(30, 41, 59, 0.6); border-radius: 8px; }
        .hidden-cc { opacity: 0; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="text-center mb-6">
        <h1 class="text-7xl font-black text-blue-500 tracking-tighter italic">Mr.CC</h1>
        <p class="text-slate-500 text-[10px] uppercase tracking-[0.4em] mt-2 font-bold">AI Synchronized Links</p>
    </div>

    <div class="w-full max-w-3xl bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl space-y-6">
        
        <div class="space-y-4">
            <input id="urlInput" type="text" placeholder="Paste Direct MP4 or Video Link..." 
                   class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 focus:ring-2 focus:ring-blue-500 outline-none text-slate-300">

            <div class="border-2 border-dashed border-slate-800 rounded-2xl p-6 text-center cursor-pointer hover:bg-slate-800 transition" onclick="document.getElementById('fileInput').click()">
                <p id="fileName" class="text-slate-500 font-bold uppercase text-xs">Or Upload MP4</p>
                <input id="fileInput" type="file" accept="video/mp4" class="hidden" onchange="initVideo(this)">
            </div>

            <button id="syncBtn" onclick="processAI()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all">
                SYNC CAPTIONS
            </button>
        </div>

        <div id="playerArea" class="hidden space-y-6">
            <div class="relative bg-black rounded-2xl overflow-hidden aspect-video border border-slate-800">
                <video id="vPlayer" class="w-full h-full" controls crossorigin="anonymous"></video>
                <div class="cc-container">
                    <div id="ccBox" class="cc-box hidden-cc"></div>
                </div>
            </div>
            <div id="transcript" class="h-32 overflow-y-auto text-slate-500 text-xs p-4 bg-black/40 rounded-xl space-y-2 font-mono scroll-smooth"></div>
        </div>
    </div>

    <p id="status" class="mt-6 text-blue-400 font-bold text-[10px] tracking-widest uppercase"></p>

    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
        
        let ccData = [];
        let transcriber = null;
        const v = document.getElementById('vPlayer');
        const ccBox = document.getElementById('ccBox');

        window.initVideo = (input) => {
            const file = input.files[0];
            if (file) {
                document.getElementById('fileName').innerText = file.name;
                v.src = URL.createObjectURL(file);
                document.getElementById('playerArea').classList.remove('hidden');
            }
        };

        window.processAI = async () => {
            const status = document.getElementById('status');
            const btn = document.getElementById('syncBtn');
            const urlValue = document.getElementById('urlInput').value.trim();
            
            let videoSource = v.src;

            // If user pasted a link instead of uploading
            if (urlValue && !videoSource) {
                // Using a public CORS proxy to bypass security blocks
                videoSource = `https://corsproxy.io/?${encodeURIComponent(urlValue)}`;
                v.src = videoSource;
                document.getElementById('playerArea').classList.remove('hidden');
            }

            if (!videoSource) return alert("Upload a file or paste a link first.");

            btn.disabled = true;
            status.innerText = "Bypassing CORS & Loading AI...";

            try {
                if (!transcriber) {
                    transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny.en');
                }

                status.innerText = "Streaming Audio Data...";
                const res = await fetch(videoSource);
                const buf = await res.arrayBuffer();
                const audioCtx = new AudioContext();
                const decoded = await audioCtx.decodeAudioData(buf);
                
                // RAM-Safe Resampling
                const offlineCtx = new OfflineAudioContext(1, decoded.duration * 16000, 16000);
                const source = offlineCtx.createBufferSource();
                source.buffer = decoded;
                source.connect(offlineCtx.destination);
                source.start();
                const resampled = await offlineCtx.startRendering();

                status.innerText = "Transcribing Lyrics...";
                const result = await transcriber(resampled.getChannelData(0), { 
                    return_timestamps: true,
                    chunk_length_s: 20,
                    suppress_non_speech_tokens: true
                });

                ccData = result.chunks.filter(c => !c.text.includes('['));
                document.getElementById('transcript').innerHTML = ccData.map((c, i) => `<p id="t-${i}" class="p-2">${c.text}</p>`).join('');
                
                status.innerText = "✅ it's";
                btn.disabled = false;
            } catch (e) {
                status.innerText = "❌ Error: Make sure it's a direct video link (mp4/webm).";
                console.error(e);
                btn.disabled = false;
            }
        };

        v.addEventListener('timeupdate', () => {
            const now = v.currentTime;
            const idx = ccData.findIndex(c => now >= c.timestamp[0] && now <= c.timestamp[1]);
            if (idx !== -1) {
                ccBox.innerText = ccData[idx].text;
                ccBox.classList.remove('hidden-cc');
                document.querySelectorAll('#transcript p').forEach(p => p.classList.remove('active-line', 'text-blue-400'));
                const line = document.getElementById(`t-${idx}`);
                if (line) { line.classList.add('active-line', 'text-blue-400'); line.scrollIntoView({behavior:'smooth', block:'center'}); }
            } else { ccBox.classList.add('hidden-cc'); }
        });
    </script>
</body>
</html>
