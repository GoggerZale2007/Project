<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr.CC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
        window.ai = pipeline;
    </script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        
        /* The Professional Caption Box */
        .cc-container {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            pointer-events: none;
            display: flex;
            justify-content: center;
        }

        .cc-box {
            background: rgba(0, 0, 0, 0.8);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 1.4rem;
            font-weight: 500;
            text-align: center;
            line-height: 1.4;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: opacity 0.2s ease;
        }

        .active-line { color: #60a5fa; font-weight: bold; background: rgba(59, 130, 246, 0.1); border-radius: 4px; }
        .hidden-cc { opacity: 0; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="text-center mb-8">
        <h1 class="text-6xl font-black text-blue-500 tracking-tighter">Mr.CC</h1>
        <p class="text-gray-400 font-medium tracking-widest uppercase text-xs mt-2">AI Visual Captioner</p>
    </div>

    <div class="w-full max-w-3xl bg-gray-900 border border-gray-800 p-8 rounded-2xl shadow-2xl space-y-6">
        
        <div class="space-y-4">
            <input id="videoLink" type="text" placeholder="Paste Video Link..." 
                   class="w-full p-4 rounded-xl bg-gray-800 border border-gray-700 focus:ring-2 focus:ring-blue-500 outline-none text-white transition-all">
            
            <div class="border-2 border-dashed border-gray-700 rounded-xl p-6 text-center cursor-pointer hover:bg-gray-800 transition-colors" onclick="document.getElementById('fileInput').click()">
                <p id="fileName" class="text-gray-500 text-sm">Click to upload MP4 file</p>
                <input id="fileInput" type="file" accept="video/mp4" class="hidden" onchange="initVideo(this)">
            </div>

            <button id="actionBtn" onclick="processWithAI()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition-transform active:scale-95 shadow-lg">
                SYNC CAPTION BOX
            </button>
        </div>

        <div id="displayArea" class="hidden space-y-4">
            <div class="relative bg-black rounded-xl overflow-hidden aspect-video border border-gray-700 shadow-inner">
                <video id="player" class="w-full h-full" controls></video>
                
                <div class="cc-container">
                    <div id="captionBox" class="cc-box hidden-cc"></div>
                </div>
            </div>

            <div id="transcript" class="h-32 overflow-y-auto text-gray-500 text-sm p-4 bg-gray-950 rounded-xl space-y-2 font-mono">
                <p class="italic text-center">Captions will follow the video timing...</p>
            </div>
        </div>
    </div>

    <p id="loaderStatus" class="mt-6 text-blue-400 font-bold text-sm tracking-widest uppercase"></p>

    <script>
        let whisper = null;
        let ccData = [];

        function initVideo(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('player').src = URL.createObjectURL(file);
                document.getElementById('displayArea').classList.remove('hidden');
            }
        }

        async function processWithAI() {
            const player = document.getElementById('player');
            const status = document.getElementById('loaderStatus');
            const transcript = document.getElementById('transcript');

            if (!player.src) return alert("Select a video first.");

            status.innerText = "⚡ AI Model Loading...";
            
            try {
                if (!whisper) {
                    whisper = await window.ai('automatic-speech-recognition', 'Xenova/whisper-tiny.en');
                }

                status.innerText = "🎧 Listening & Timing...";
                const audioCtx = new AudioContext();
                const res = await fetch(player.src);
                const decoded = await audioCtx.decodeAudioData(await res.arrayBuffer());
                
                const result = await whisper(decoded.getChannelData(0), { return_timestamps: true });
                ccData = result.chunks;

                // Populate Transcript List
                transcript.innerHTML = ccData.map((c, i) => `<p id="t-${i}">${c.text}</p>`).join('');
                status.innerText = "Ready!";
                setTimeout(() => status.innerText = "", 2000);
            } catch (e) {
                status.innerText = "Error: " + e.message;
            }
        }

        // Real-time Sync Logic
        const player = document.getElementById('player');
        const captionBox = document.getElementById('captionBox');

        player.addEventListener('timeupdate', () => {
            const time = player.currentTime;
            const currentIdx = ccData.findIndex(c => time >= c.timestamp[0] && time <= c.timestamp[1]);

            if (currentIdx !== -1) {
                captionBox.innerText = ccData[currentIdx].text;
                captionBox.classList.remove('hidden-cc');

                // Highlight scrolling text
                document.querySelectorAll('#transcript p').forEach(p => p.className = '');
                const activeLine = document.getElementById(`t-${currentIdx}`);
                if (activeLine) {
                    activeLine.className = 'active-line text-blue-400';
                    activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else {
                captionBox.classList.add('hidden-cc');
            }
        });
    </script>
</body>
</html>
