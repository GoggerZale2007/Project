<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mr.CC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';
        window.ai = pipeline;
    </script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .cc-container {
            position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
            width: 85%; pointer-events: none; display: flex; justify-content: center; z-index: 50;
        }
        .cc-box {
            background: rgba(0, 0, 0, 0.85); color: #fff; padding: 6px 18px;
            border-radius: 6px; font-size: 1.25rem; font-weight: 600; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 20px rgba(0,0,0,0.6);
        }
        .active-line { color: #60a5fa; font-weight: 800; background: rgba(30, 41, 59, 0.8); border-radius: 6px; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="text-center mb-6">
        <h1 class="text-6xl font-black text-blue-500 tracking-tighter">Mr.CC</h1>
        <p class="text-gray-500 text-[10px] uppercase tracking-[0.3em] mt-1">AI Lyric Sync Engine</p>
    </div>

    <div class="w-full max-w-3xl bg-slate-900 border border-slate-800 p-6 rounded-2xl shadow-2xl space-y-4">
        
        <div class="grid grid-cols-1 gap-3">
            <input id="videoLink" type="text" placeholder="YouTube or Playback Link (Requires MP4 Upload for AI)" 
                   class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 outline-none text-sm">
            
            <div class="border border-dashed border-slate-700 rounded-lg p-4 text-center cursor-pointer hover:bg-slate-800 transition" onclick="document.getElementById('fileInput').click()">
                <p id="fileName" class="text-slate-500 text-xs font-bold uppercase">Select MP4 File</p>
                <input id="fileInput" type="file" accept="video/mp4" class="hidden" onchange="initVideo(this)">
            </div>

            <button id="actionBtn" onclick="processWithAI()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-3 rounded-lg transition-all shadow-lg text-sm">
                SYNC CAPTIONS
            </button>
        </div>

        <div id="displayArea" class="hidden space-y-4">
            <div class="relative bg-black rounded-lg overflow-hidden aspect-video border border-slate-800">
                <video id="player" class="w-full h-full" controls></video>
                <div class="cc-container">
                    <div id="captionBox" class="cc-box hidden"></div>
                </div>
            </div>

            <div id="transcript" class="h-28 overflow-y-auto text-slate-500 text-xs p-3 bg-slate-950 rounded-lg space-y-1 font-mono">
                <p class="text-center opacity-50">Upload and click Sync to start AI...</p>
            </div>
        </div>
    </div>

    <p id="loaderStatus" class="mt-4 text-blue-400 font-bold text-[10px] tracking-widest uppercase"></p>

    <script>
        let whisper = null;
        let ccData = [];

        function initVideo(input) {
            const file = input.files[0];
            if (file) {
                document.getElementById('fileName').innerText = file.name;
                document.getElementById('player').src = URL.createObjectURL(file);
                document.getElementById('displayArea').classList.remove('hidden');
            }
        }

        async function processWithAI() {
            const player = document.getElementById('player');
            const status = document.getElementById('loaderStatus');
            const transcript = document.getElementById('transcript');

            if (!player.src) return alert("Please upload a video file first!");

            status.innerText = "⏳ Loading AI (Base Model)...";
            
            try {
                if (!whisper) {
                    // Using 'base' for better lyrics, 'tiny' is faster but worse with music
                    whisper = await window.ai('automatic-speech-recognition', 'Xenova/whisper-base.en');
                }

                status.innerText = "🔊 Analyzing Audio & Filtering Music...";
                const audioCtx = new AudioContext();
                const res = await fetch(player.src);
                const decoded = await audioCtx.decodeAudioData(await res.arrayBuffer());
                
                const result = await whisper(decoded.getChannelData(0), { 
                    return_timestamps: true,
                    // Advanced parameters to reduce "[Music]" hallucinations
                    suppress_tokens: [-1], 
                    language: 'en'
                });

                // Filter out Music tags and empty strings
                ccData = result.chunks.filter(c => {
                    const t = c.text.toLowerCase();
                    return !t.includes('[music]') && !t.includes('[silence]') && t.trim().length > 0;
                });

                transcript.innerHTML = ccData.map((c, i) => `<p id="t-${i}" class="p-1">${c.text}</p>`).join('');
                status.innerText = "✅ Done!";
            } catch (e) {
                status.innerText = "❌ Error: " + e.message;
            }
        }

        const player = document.getElementById('player');
        const captionBox = document.getElementById('captionBox');

        player.addEventListener('timeupdate', () => {
            const time = player.currentTime;
            const currentIdx = ccData.findIndex(c => time >= c.timestamp[0] && time <= c.timestamp[1]);

            if (currentIdx !== -1) {
                captionBox.innerText = ccData[currentIdx].text;
                captionBox.classList.remove('hidden');

                document.querySelectorAll('#transcript p').forEach(p => p.className = 'p-1');
                const activeLine = document.getElementById(`t-${currentIdx}`);
                if (activeLine) {
                    activeLine.className = 'active-line p-1 text-blue-400';
                    activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            } else {
                captionBox.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
