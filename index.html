<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gnome Sort Visualizer</title>
    <style>
        :root { 
            --bg: #09090b; 
            --bar: #3f3f46; 
            --active: #ef4444; 
            --success: #22c55e;
            --text: #fafafa;
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', system-ui, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        #visualizer { 
            display: flex; 
            align-items: flex-end; 
            height: 350px; 
            width: 85vw; 
            max-width: 600px;
            gap: 4px; 
            padding: 24px;
            background: #18181b;
            border-radius: 12px;
            border: 1px solid #27272a;
        }
        .bar { 
            flex: 1; 
            background: var(--bar); 
            border-radius: 2px 2px 0 0;
            transition: height 0.1s, background-color 0.1s; 
        }
        .active { background: var(--active); }
        .success { background: var(--success); }
        .controls { margin-top: 40px; }
        button { 
            padding: 12px 24px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            background: var(--text); 
            color: var(--bg); 
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1 style="font-weight: 400; letter-spacing: -1px;">Gnome Sort</h1>
    <div id="visualizer"></div>

    <div class="controls">
        <button id="start" onclick="runSort()">Start Animation</button>
    </div>

    <script>
        const container = document.getElementById('visualizer');
        const startBtn = document.getElementById('start');
        let audioCtx;
        let arr = [];
        const n_elements = 25;

        function init() {
            arr = Array.from({length: n_elements}, () => Math.floor(Math.random() * 85) + 10);
            render();
        }

        function render(activePos = -1, isDone = false) {
            container.innerHTML = '';
            arr.forEach((val, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                if (i === activePos) bar.classList.add('active');
                if (isDone) bar.classList.add('success');
                bar.style.height = `${val}%`;
                container.appendChild(bar);
            });
        }

        // Creates the "Beep" sound for each step
        function playStepSound(val) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            // Scale frequency based on bar height (higher bar = higher pitch)
            osc.frequency.setValueAtTime(200 + (val * 10), audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.08);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }

        async function playVictoryChime() {
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C Major
            for (let freq of notes) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
                await new Promise(r => setTimeout(r, 120));
            }
        }

        async function runSort() {
            // Browsers require a user gesture to start audio
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            startBtn.disabled = true;

            // Logic matching the provided code snippet
            let pos = 0;
            const n = arr.length;

            while (pos < n) {
                render(pos);
                playStepSound(arr[pos]);
                await new Promise(r => setTimeout(r, 60)); // Adjust speed here

                if (pos === 0 || arr[pos] >= arr[pos - 1]) {
                    pos++;
                } else {
                    // Swap logic
                    [arr[pos], arr[pos - 1]] = [arr[pos - 1], arr[pos]];
                    pos--;
                }
            }
            
            render(-1, true); // Final green state
            await playVictoryChime();
            
            // Re-shuffle after a short delay so user can see result
            setTimeout(() => {
                init();
                startBtn.disabled = false;
            }, 1500);
        }

        init();
    </script>
</body>
</html>
